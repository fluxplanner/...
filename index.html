<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Flux Planner</title>
    <link rel="stylesheet" href="public/css/styles.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>
    <div id="splash-screen" style="position:fixed; inset:0; background:#fff; display:flex; align-items:center; justify-content:center; z-index:9999;">
        <h1>FLUX</h1>
    </div>

    <div id="auth-overlay" style="display:none; position:fixed; inset:0; background:#fff; flex-direction:column; align-items:center; justify-content:center; z-index:100;">
        <h2>Welcome to Flux</h2>
        <button id="login-btn" style="margin-top:20px; padding:10px 20px; cursor:pointer;">Login with Google</button>
    </div>

    <div id="app" style="display:none;">
        <nav style="padding:20px; border-bottom:1px solid #eee; display:flex; gap:20px;">
            <strong>FLUX</strong>
            <button onclick="showTab('dashboard')">Dashboard</button>
            <button onclick="showTab('school')">School Info</button>
        </nav>
        <main style="padding:20px;">
            <h1 id="tab-title">Dashboard</h1>
            <div id="tab-content"></div>
        </main>
    </div>

    <script src="public/js/app.js"></script>
</body>
</html>
