<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
    <title>Flux Planner</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=JetBrains+Mono:wght@300;400&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="public/css/styles.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdn.jsdelivr.net/npm/lucide@0.321.0/dist/umd/lucide.min.js"></script>
</head>
<body>
    <div id="splash-screen" class="splash-overlay">
        <div class="splash-content">
            <h1 class="splash-logo">FLUX</h1>
            <div class="loader-bar"><div class="loader-progress"></div></div>
        </div>
    </div>

    <div id="app" style="display: none;">
        <nav class="sidebar" id="sidebar">
            <div class="sidebar-header">
                <span class="logo-text">FLUX</span>
                <button id="sidebar-toggle" class="icon-btn"><i data-lucide="chevron-left"></i></button>
            </div>
            
            <div class="nav-group">
                <p class="nav-label">Main</p>
                <button class="nav-item active" data-tab="dashboard"><i data-lucide="layout-dashboard"></i> <span>Dashboard</span></button>
                <button class="nav-item" data-tab="calendar"><i data-lucide="calendar"></i> <span>Calendar</span></button>
                <button class="nav-item" data-tab="ai"><i data-lucide="sparkles"></i> <span>Flux AI</span></button>
            </div>

            <div class="nav-group">
                <p class="nav-label">School</p>
                <button class="nav-item" data-tab="school-info"><i data-lucide="school"></i> <span>School Info</span></button>
                <button class="nav-item" data-tab="grades"><i data-lucide="graduation-cap"></i> <span>Grades</span></button>
                <button class="nav-item" data-tab="notes"><i data-lucide="sticky-note"></i> <span>Notes</span></button>
                <button class="nav-item" data-tab="timer"><i data-lucide="timer"></i> <span>Focus Timer</span></button>
            </div>

            <div class="nav-group">
                <p class="nav-label">Personal</p>
                <button class="nav-item" data-tab="profile"><i data-lucide="user"></i> <span>Profile</span></button>
                <button class="nav-item" data-tab="settings"><i data-lucide="settings"></i> <span>Settings</span></button>
            </div>
        </nav>

        <main class="content-area">
            <header class="topbar">
                <div class="topbar-left"><h2 id="current-tab-title">Dashboard</h2></div>
                <div class="topbar-right">
                    <div id="sync-status" class="status-pill"><i data-lucide="cloud-check"></i> Saved</div>
                    <div id="user-menu" class="user-pill">
                        <img id="user-avatar" src="https://api.dicebear.com/7.x/avataaars/svg?seed=Flux" alt="avatar">
                        <span id="user-name-display">Student</span>
                    </button>
                </div>
            </header>
            <section id="tab-content"></section>
        </main>
    </div>

    <div id="auth-overlay" class="modal-overlay" style="display: none;">
        <div class="auth-card">
            <h2>Welcome to Flux</h2>
            <p>Your personalized academic command center.</p>
            <button id="google-login-btn" class="primary-btn"><img src="https://www.google.com/favicon.ico" width="16"> Continue with Google</button>
        </div>
    </div>
    <script src="public/js/app.js"></script>
</body>
</html>
