<svg width="100%" viewBox="160 162 380 380" preserveAspectRatio="xMidYMid meet" xmlns="http://www.w3.org/2000/svg" role="img" style="">
<title style="fill:rgb(0, 0, 0);stroke:none;color:rgb(255, 255, 255);stroke-width:1px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:&quot;Anthropic Sans&quot;, -apple-system, &quot;system-ui&quot;, &quot;Segoe UI&quot;, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto">Flux Planner Logo — Transparent Background</title>
<desc style="fill:rgb(0, 0, 0);stroke:none;color:rgb(255, 255, 255);stroke-width:1px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:&quot;Anthropic Sans&quot;, -apple-system, &quot;system-ui&quot;, &quot;Segoe UI&quot;, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto">Flux Planner logo with transparent background, lemniscate curve in cyan-to-purple gradient</desc>
<defs>
  <linearGradient id="lemGrad" x1="0%" y1="0%" x2="100%" y2="0%">
    <stop offset="0%" stop-color="#00C2FF" stop-opacity="0.0"/>
    <stop offset="22%" stop-color="#00C2FF" stop-opacity="1"/>
    <stop offset="50%" stop-color="#A78BFF" stop-opacity="1"/>
    <stop offset="78%" stop-color="#7C5CFF" stop-opacity="1"/>
    <stop offset="100%" stop-color="#7C5CFF" stop-opacity="0.0"/>
  </linearGradient>
  <linearGradient id="lemGrad2" x1="0%" y1="0%" x2="100%" y2="0%">
    <stop offset="0%" stop-color="#00C2FF" stop-opacity="0.0"/>
    <stop offset="22%" stop-color="#00C2FF" stop-opacity="0.3"/>
    <stop offset="50%" stop-color="#A78BFF" stop-opacity="0.3"/>
    <stop offset="78%" stop-color="#7C5CFF" stop-opacity="0.3"/>
    <stop offset="100%" stop-color="#7C5CFF" stop-opacity="0.0"/>
  </linearGradient>
  <linearGradient id="textGrad" x1="0%" y1="0%" x2="100%" y2="0%">
    <stop offset="0%" stop-color="#00C2FF"/>
    <stop offset="55%" stop-color="#A78BFF"/>
    <stop offset="100%" stop-color="#7C5CFF"/>
  </linearGradient>
  <linearGradient id="tagGrad" x1="0%" y1="0%" x2="100%" y2="0%">
    <stop offset="0%" stop-color="#00C2FF" stop-opacity="0.55"/>
    <stop offset="100%" stop-color="#7C5CFF" stop-opacity="0.55"/>
  </linearGradient>
  <radialGradient id="coreDot" cx="50%" cy="50%" r="50%">
    <stop offset="0%" stop-color="#ffffff" stop-opacity="0.95"/>
    <stop offset="45%" stop-color="#60d0ff" stop-opacity="0.8"/>
    <stop offset="100%" stop-color="#00C2FF" stop-opacity="0"/>
  </radialGradient>
  <radialGradient id="coreGlow" cx="50%" cy="50%" r="50%">
    <stop offset="0%" stop-color="#00C2FF" stop-opacity="0.15"/>
    <stop offset="100%" stop-color="#00C2FF" stop-opacity="0"/>
  </radialGradient>
  <filter id="softBlur"><feGaussianBlur stdDeviation="2.5"/></filter>
  <filter id="glowBlur"><feGaussianBlur stdDeviation="6"/></filter>
</defs>

<!-- All lemniscate elements in one group, origin at (392,265), scaled from that point -->
<g transform="translate(392,265) scale(0.72) translate(-392,-265)" style="fill:rgb(0, 0, 0);stroke:none;color:rgb(255, 255, 255);stroke-width:1px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:&quot;Anthropic Sans&quot;, -apple-system, &quot;system-ui&quot;, &quot;Segoe UI&quot;, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto">

  <!-- Glow bloom -->
  <g filter="url(#glowBlur)" opacity="0.5" style="fill:rgb(0, 0, 0);stroke:none;color:rgb(255, 255, 255);stroke-width:1px;stroke-linecap:butt;stroke-linejoin:miter;opacity:0.5;font-family:&quot;Anthropic Sans&quot;, -apple-system, &quot;system-ui&quot;, &quot;Segoe UI&quot;, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto">
    <path d="M392,265 C410,213 540,213 540,265 C540,317 410,317 392,265 C340,155 140,155 140,265 C140,375 340,375 392,265 Z" fill="none" stroke="url(#lemGrad2)" stroke-width="18" stroke-linecap="round" style="fill:none;color:rgb(255, 255, 255);stroke-width:18px;stroke-linecap:round;stroke-linejoin:miter;opacity:1;font-family:&quot;Anthropic Sans&quot;, -apple-system, &quot;system-ui&quot;, &quot;Segoe UI&quot;, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto"/>
  </g>

  <!-- Secondary lemniscate -->
  <path d="M392,265 C414,201 560,201 560,265 C560,329 414,329 392,265 C332,139 108,139 108,265 C108,391 332,391 392,265 Z" fill="none" stroke="url(#lemGrad2)" stroke-width="5" stroke-linecap="round" style="fill:none;color:rgb(255, 255, 255);stroke-width:5px;stroke-linecap:round;stroke-linejoin:miter;opacity:1;font-family:&quot;Anthropic Sans&quot;, -apple-system, &quot;system-ui&quot;, &quot;Segoe UI&quot;, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto"/>

  <!-- Primary lemniscate -->
  <path d="M392,265 C410,213 540,213 540,265 C540,317 410,317 392,265 C340,155 140,155 140,265 C140,375 340,375 392,265 Z" fill="none" stroke="url(#lemGrad)" stroke-width="14" stroke-linecap="round" style="fill:none;color:rgb(255, 255, 255);stroke-width:14px;stroke-linecap:round;stroke-linejoin:miter;opacity:1;font-family:&quot;Anthropic Sans&quot;, -apple-system, &quot;system-ui&quot;, &quot;Segoe UI&quot;, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto"/>

  <!-- Center dot at lemniscate origin -->
  <circle cx="392" cy="265" r="36" fill="url(#coreGlow)" style="stroke:none;color:rgb(255, 255, 255);stroke-width:1px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:&quot;Anthropic Sans&quot;, -apple-system, &quot;system-ui&quot;, &quot;Segoe UI&quot;, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto"/>
  <circle cx="392" cy="265" r="9" fill="url(#coreDot)" style="stroke:none;color:rgb(255, 255, 255);stroke-width:1px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:&quot;Anthropic Sans&quot;, -apple-system, &quot;system-ui&quot;, &quot;Segoe UI&quot;, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto"/>

  <!-- Orbital dot — sits on the right lobe at its topmost point (540, 213) -->
  <circle cx="540" cy="213" r="5" fill="#00C2FF" opacity="0.85" style="fill:rgb(0, 194, 255);stroke:none;color:rgb(255, 255, 255);stroke-width:1px;stroke-linecap:butt;stroke-linejoin:miter;opacity:0.85;font-family:&quot;Anthropic Sans&quot;, -apple-system, &quot;system-ui&quot;, &quot;Segoe UI&quot;, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto"/>
  <circle cx="540" cy="213" r="9" fill="#00C2FF" opacity="0.15" filter="url(#softBlur)" style="fill:rgb(0, 194, 255);stroke:none;color:rgb(255, 255, 255);stroke-width:1px;stroke-linecap:butt;stroke-linejoin:miter;opacity:0.15;font-family:&quot;Anthropic Sans&quot;, -apple-system, &quot;system-ui&quot;, &quot;Segoe UI&quot;, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto"/>

</g>

<!-- "Flux" wordmark -->
<text x="340" y="476" text-anchor="middle" font-family="'SF Pro Display', 'Helvetica Neue', Arial, system-ui, sans-serif" font-size="96" font-weight="800" letter-spacing="-2" fill="url(#textGrad)" style="stroke:none;color:rgb(255, 255, 255);stroke-width:1px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:&quot;SF Pro Display&quot;, &quot;Helvetica Neue&quot;, Arial, system-ui, sans-serif;font-size:96px;font-weight:800;text-anchor:middle;dominant-baseline:auto">Flux</text>

<!-- Divider rule -->
<rect x="240" y="494" width="200" height="1.5" rx="1" fill="url(#tagGrad)" style="stroke:none;color:rgb(255, 255, 255);stroke-width:1px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:&quot;Anthropic Sans&quot;, -apple-system, &quot;system-ui&quot;, &quot;Segoe UI&quot;, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto"/>

<!-- "Planner" tagline -->
<text x="340" y="534" text-anchor="middle" font-family="'SF Pro Display', 'Helvetica Neue', Arial, system-ui, sans-serif" font-size="26" font-weight="500" letter-spacing="9" fill="rgba(255,255,255,0.38)" style="fill:rgba(255, 255, 255, 0.38);stroke:none;color:rgb(255, 255, 255);stroke-width:1px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:&quot;SF Pro Display&quot;, &quot;Helvetica Neue&quot;, Arial, system-ui, sans-serif;font-size:26px;font-weight:500;text-anchor:middle;dominant-baseline:auto">PLANNER</text>

</svg>
