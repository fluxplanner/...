<svg width="680" height="680" viewBox="0 0 680 680" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Flux Planner">
<defs>
  <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
    <stop offset="0%" stop-color="#0F1729"/>
    <stop offset="100%" stop-color="#090D17"/>
  </linearGradient>
  <linearGradient id="lineGrad" x1="0%" y1="0%" x2="100%" y2="0%">
    <stop offset="0%" stop-color="#1B4A7A" stop-opacity="0"/>
    <stop offset="18%" stop-color="#1B6FAA"/>
    <stop offset="42%" stop-color="#00C2FF"/>
    <stop offset="100%" stop-color="#00C2FF" stop-opacity="0"/>
  </linearGradient>
  <linearGradient id="fluxGrad" x1="0%" y1="0%" x2="100%" y2="0%">
    <stop offset="0%" stop-color="#5BBFEA"/>
    <stop offset="100%" stop-color="#00C2FF"/>
  </linearGradient>
  <radialGradient id="dotGlow" cx="50%" cy="50%" r="50%">
    <stop offset="0%" stop-color="#00C2FF" stop-opacity="0.9"/>
    <stop offset="60%" stop-color="#00C2FF" stop-opacity="0.3"/>
    <stop offset="100%" stop-color="#00C2FF" stop-opacity="0"/>
  </radialGradient>
  <radialGradient id="ambientGlow" cx="50%" cy="50%" r="50%">
    <stop offset="0%" stop-color="#0057A8" stop-opacity="0.28"/>
    <stop offset="100%" stop-color="#090D17" stop-opacity="0"/>
  </radialGradient>
  <clipPath id="sqClip">
    <rect x="90" y="90" width="500" height="500" rx="88"/>
  </clipPath>
</defs>

<rect x="90" y="90" width="500" height="500" rx="88" fill="url(#bg)"/>
<rect x="90" y="90" width="500" height="500" rx="88" fill="url(#ambientGlow)"/>
<rect x="90" y="90" width="500" height="500" rx="88" fill="none" stroke="#FFFFFF" stroke-width="0.8" stroke-opacity="0.07"/>

<ellipse cx="340" cy="368" rx="28" ry="28" fill="url(#dotGlow)" clip-path="url(#sqClip)"/>
<rect x="130" y="365" width="420" height="7" rx="3.5" fill="url(#lineGrad)" clip-path="url(#sqClip)"/>
<circle cx="155" cy="368.5" r="7" fill="#00C2FF"/>
<circle cx="155" cy="368.5" r="3.6" fill="#FFFFFF"/>

<text x="340" y="358"
  font-family="'Inter', 'SF Pro Display', 'Helvetica Neue', sans-serif"
  font-weight="800"
  font-size="124"
  letter-spacing="-5"
  fill="url(#fluxGrad)"
  text-anchor="middle">Flux</text>

<text x="340" y="406"
  font-family="'Inter', 'SF Pro Display', 'Helvetica Neue', sans-serif"
  font-weight="400"
  font-size="23"
  letter-spacing="8.5"
  fill="#FFFFFF"
  fill-opacity="0.92"
  text-anchor="middle">Planner</text>

<line x1="90" y1="448" x2="590" y2="448" stroke="#FFFFFF" stroke-width="0.5" stroke-opacity="0.1"/>

<text x="340" y="482"
  font-family="'Inter', 'SF Pro Display', 'Helvetica Neue', sans-serif"
  font-weight="400"
  font-size="12"
  letter-spacing="5"
  fill="#FFFFFF"
  fill-opacity="0.7"
  text-anchor="middle">YOUR SMART SCHOOL PLANNER</text>

</svg>
